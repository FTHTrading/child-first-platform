<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="60" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background shield -->
  <path d="M50 4 L92 20 L92 58 Q92 82 50 97 Q8 82 8 58 L8 20 Z" fill="url(#bg)"/>
  <!-- Inner gold ring -->
  <path d="M50 10 L86 24 L86 58 Q86 78 50 91 Q14 78 14 58 L14 24 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- Star at top -->
  <path d="M50 13 L53 22 L63 22 L55.5 27.5 L58.5 36.5 L50 31 L41.5 36.5 L44.5 27.5 L37 22 L47 22 Z" fill="url(#gold)"/>

  <!-- Child: head -->
  <circle cx="50" cy="53" r="8.5" fill="white"/>

  <!-- Child: torso -->
  <path d="M50 61.5 L50 75" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Child: arms raised in joy -->
  <path d="M50 65 L36 57" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M50 65 L64 57" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Child: legs -->
  <path d="M50 75 L43 85" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M50 75 L57 85" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Heart on chest -->
  <path d="M47 67.5 C47 65.8 48.2 64.8 50 66 C51.8 64.8 53 65.8 53 67.5 C53 69.5 50 72 50 72 C50 72 47 69.5 47 67.5 Z" fill="url(#gold)"/>
</svg>
